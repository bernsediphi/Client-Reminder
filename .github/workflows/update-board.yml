name: Update Partner Occasions Board

on:
  schedule:
    # Runs every 6 hours. Adjust as needed (cron is in UTC).
    - cron: "0 */6 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh-board:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Pull latest form responses and rewrite index.html
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: python scripts/update_board.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-refresh occasions board data"
            git push
          fi
